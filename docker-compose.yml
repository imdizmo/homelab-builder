version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: homelab-builder-db
    environment:
      POSTGRES_USER: homelab
      POSTGRES_PASSWORD: homelab_password
      POSTGRES_DB: homelab_builder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelab -d homelab_builder"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data: