version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: homelab-builder-db
    environment:
      POSTGRES_USER: homelab
      POSTGRES_PASSWORD: homelab_password
      POSTGRES_DB: homelab_builder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelab -d homelab_builder"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homelab-builder-backend
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: homelab
      DB_PASSWORD: homelab_password
      DB_NAME: homelab_builder
      DB_SSLMODE: disable
      JWT_SECRET: change-this-in-production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homelab-builder-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: