name: Tests

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: ./frontend
        run: npm test

  test-hlbipam:
    name: hlbIPAM Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: false

      - name: Run Go tests
        working-directory: ./hlbipam
        run: go test ./... -v -count=1

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run docker-compose test
        # We rely on the docker-compose.test.yml file to build and run the tests.
        # It handles starting postgres, hlbipam, and the backend test runner.
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit

  # Gate job — all test jobs must pass for this to succeed.
  # Use this as the single required status check in GitHub branch protection.
  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [test-frontend, test-hlbipam, test-backend]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-frontend.result }}" != "success" ] || \
             [ "${{ needs.test-hlbipam.result }}" != "success" ] || \
             [ "${{ needs.test-backend.result }}" != "success" ]; then
            echo "One or more test jobs failed."
            exit 1
          fi
          echo "All tests passed!"
